// ===== SIM: 실제 guide.ts inferStep의 교육용 미러 =====

const initialSim = {
  hasPlanDoc: false,
  hasCheckpoint: false,
  diskFiles: [],      // 실제 디스크(AI가 고친 것) — [{ path, rev }], rev = 실제 지문(path+status+mtime+size)의 단순화
  changedFiles: [],   // 앱이 마지막 조회로 아는 것 — setPage(탭 전환)에서 diskFiles와 동기화(재조회 미러, 가이드 v6 spec §4-6)
  baseline: [],       // 체크포인트 시점 스냅샷
  guardOk: false,
  page: "home",
};

function countChanges(baseline, current) {
  // 실제 countChangesSinceBaseline의 미러: 경로 대칭차 + 같은 경로 rev 변화도 변경
  const b = new Map(baseline.map((f) => [f.path, f.rev]));
  const c = new Map(current.map((f) => [f.path, f.rev]));
  let n = 0;
  for (const [p, rev] of c) if (b.get(p) !== rev) n += 1;
  for (const p of b.keys()) if (!c.has(p)) n += 1;
  return n;
}

function inferStep(s) {
  // 실제 guide.ts inferStep의 축소 미러(신호 이름 동일 — 코드가 곧 교보재).
  // planningPending 신호만 생략 — 연습장에는 AI 대화 지연 상태가 없다.
  let step = !s.hasPlanDoc ? 2 : !s.hasCheckpoint ? 3 : 4;
  if (s.hasCheckpoint && countChanges(s.baseline, s.changedFiles) > 0) {
    step = s.guardOk ? 6 : 5;
  }
  return step;
}

function simReducer(state, action) {
  switch (action.type) {
    case "confirmPlan":
      return { ...state, hasPlanDoc: true };
    case "saveCheckpoint":
      return {
        ...state,
        hasCheckpoint: true,
        baseline: state.changedFiles.map(f => ({ ...f })),
        guardOk: false,
      };
    case "simAiEdit": {
      // 디스크만 변경 — 앱(changedFiles)은 아직 모른다. 탭 전환(setPage)에서 알아챈다.
      const existing = state.diskFiles.map(f => ({ ...f }));
      const newFiles = [
        { path: "src/pages/Home.tsx", rev: 1 },
        { path: "src/lib/api.ts", rev: 1 },
      ];
      const merged = [...existing];
      for (const nf of newFiles) {
        if (!merged.find(f => f.path === nf.path)) merged.push(nf);
      }
      return { ...state, diskFiles: merged };
    }
    case "simReEdit": {
      // 디스크만 변경(rev+1) — guardOk 리셋도 여기서가 아니라 관찰 시점(setPage)에 일어난다(실제 미러).
      const files = state.diskFiles.map(f => ({ ...f }));
      if (files.length > 0) {
        files[0] = { ...files[0], rev: files[0].rev + 1 };
      }
      return { ...state, diskFiles: files };
    }
    case "runGuard":
      return { ...state, guardOk: true };
    case "setPage": {
      // 탭 전환 = 실제 앱의 changed-set 재조회 미러(가이드 v6 spec §4-6).
      const synced = state.diskFiles.map(f => ({ ...f }));
      // 지문(rev) 변화 감지 시 guardOk 리셋 — 검증 시점 지문과 달라지면 stale pass를 남기지 않는 실제 동작의 미러
      const fingerprintChanged = countChanges(state.changedFiles, synced) > 0;
      return {
        ...state,
        page: action.page,
        changedFiles: synced,
        guardOk: fingerprintChanged ? false : state.guardOk,
      };
    }
    case "reset":
      return { ...initialSim };
    default:
      return state;
  }
}

// ===== SCREENS: 화면 컴포넌트 =====

// GuideStrip 미러
function GuideStrip({ sim, dispatch, celebrating, onEscapeClick }) {
  const step = inferStep(sim);
  const stepData = {
    2: { icon: COPY.step2_icon, label: COPY.step2_label, short: COPY.step2_short, targetPage: "planning" },
    3: { icon: COPY.step3_icon, label: COPY.step3_label, short: COPY.step3_short, targetPage: "backups" },
    4: { icon: COPY.step4_icon, label: COPY.step4_label, short: COPY.step4_short, targetPage: "code" },
    5: { icon: COPY.step5_icon, label: COPY.step5_label, short: COPY.step5_short, targetPage: "home" },
    6: { icon: COPY.step6_icon, label: COPY.step6_label, short: COPY.step6_short, targetPage: "backups" },
  };
  const def = stepData[step];
  const pageLabel = { planning: COPY.page_planning, backups: COPY.page_backups, code: COPY.page_code, home: COPY.page_home };

  if (celebrating) {
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "6px 12px", fontSize: 13, color: "#4DFF91", background: "#0E0E0E", borderBottom: "1px solid #1A1A1A" }}>
        <span>🎉 <b>{COPY.celebrate_bold}</b> 기획부터 저장까지 해냈어요 — 이 흐름 그대로 반복하면 돼요</span>
      </div>
    );
  }

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 16, padding: "6px 12px", fontSize: 11, color: "#888", background: "#0E0E0E", borderBottom: "1px solid #1A1A1A" }}>
      <span style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13 }}>
        <span style={{ color: "#ccc" }}>
          {COPY.strip_prefix}{" "}
          <span style={{ color: "#FBBF24", fontWeight: 700 }}>{def.icon} {def.label}</span>
          {" "}— {def.short}
        </span>
        <button
          id="strip-go"
          className="nav-tab"
          style={{ fontSize: 12, padding: "0 8px" }}
          onClick={() => dispatch({ type: "setPage", page: def.targetPage })}
        >
          {pageLabel[def.targetPage]}{COPY.nav_suffix}
        </button>
        {step === 4 && (
          <button
            className="nav-tab"
            style={{ fontSize: 12, padding: "0 8px", color: "#FBBF24" }}
            onClick={() => dispatch({ type: "setPage", page: "home" })}
          >
            {COPY.affordance}
          </button>
        )}
        {(step === 4 || step === 5) && (
          <button
            id="strip-escape"
            className="nav-tab"
            style={{ fontSize: 12, padding: "0 8px", color: "#888" }}
            onClick={() => { onEscapeClick && onEscapeClick(); dispatch({ type: "setPage", page: "backups" }); }}
          >
            {COPY.escape}
          </button>
        )}
      </span>
      <div style={{ flex: 1 }} />
      <span style={{ color: sim.hasCheckpoint ? "#aaa" : "#666" }}>
        {sim.hasCheckpoint ? COPY.backup_ok : COPY.backup_none}
      </span>
    </div>
  );
}

// 단계 탭바 (STAGE_DEFS 미러)
function StageTabs({ activePage, dispatch }) {
  const activeStage = activePage === "planning" ? "planning" : activePage === "code" ? "develop" : (activePage === "backups" || activePage === "doctor") ? "maintain" : null;
  const stages = [
    { key: "planning", label: "📋 " + COPY.stage_planning },
    { key: "develop", label: "⚙️ " + COPY.stage_develop },
    { key: "maintain", label: "🛡️ " + COPY.stage_maintain },
  ];
  return (
    <div id="tabbar" style={{ display: "flex", gap: 4, padding: "6px 12px", background: "#0E0E0E", borderBottom: "1px solid #1A1A1A" }}>
      <button className={"stage-tab" + (activePage === "home" ? " active" : "")} onClick={() => dispatch({ type: "setPage", page: "home" })}>{COPY.page_home}</button>
      {stages.map(s => {
        const targetPage = s.key === "planning" ? "planning" : s.key === "develop" ? "code" : "backups";
        return (
          <button key={s.key} className={"stage-tab" + (activeStage === s.key ? " active" : "")} onClick={() => dispatch({ type: "setPage", page: targetPage })}>
            {s.label}
          </button>
        );
      })}
    </div>
  );
}

// 페이지 탭바
function PageTabs({ activePage, dispatch }) {
  const subPages = {
    planning: [{ key: "planning", label: COPY.page_planning }],
    develop: [{ key: "code", label: COPY.page_code }],
    maintain: [{ key: "backups", label: COPY.page_backups }, { key: "doctor", label: "진단" }],
  };
  const stageKey = activePage === "planning" ? "planning" : activePage === "code" ? "develop" : (activePage === "backups" || activePage === "doctor") ? "maintain" : null;
  if (!stageKey) return null;
  return (
    <div id="page-tabbar" style={{ display: "flex", gap: 4, padding: "4px 12px", background: "#0A0A0A", borderBottom: "1px solid #1A1A1A" }}>
      {(subPages[stageKey] || []).map(p => (
        <button key={p.key} className={"nav-tab" + (activePage === p.key ? " active" : "")} onClick={() => dispatch({ type: "setPage", page: p.key })}>
          {p.label}
        </button>
      ))}
    </div>
  );
}

// 허브 카드 (cardStepState 규칙 미러: 기획=[2], 개발=[4], 유지보수=[3,6])
function HubCard({ stage, currentStep, onClick }) {
  const stageSteps = { planning: [2], develop: [4], maintain: [3, 6] };
  const stageLabels = { planning: { icon: "📋", label: COPY.stage_planning, desc: "AI와 함께 기획안 확정" }, develop: { icon: "⚙️", label: COPY.stage_develop, desc: "AI 도구에 지시문 전달" }, maintain: { icon: "🛡️", label: COPY.stage_maintain, desc: "체크포인트·되돌리기" } };
  const steps = stageSteps[stage];
  let state;
  if (steps.includes(currentStep)) state = "now";
  else if (steps.every(s => s < currentStep)) state = "done";
  else state = "upcoming";

  const info = stageLabels[stage];
  const borderColor = state === "now" ? "#FBBF24" : state === "done" ? "#4DFF91" : "#2A2A2A";
  const badge = state === "now" ? { text: "지금 할 차례", bg: "#FBBF24", color: "#000" } : state === "done" ? { text: "✓ 완료", bg: "#1A3A2A", color: "#4DFF91" } : { text: "다음", bg: "#1A1A1A", color: "#666" };

  return (
    <div onClick={onClick} style={{ background: "#141414", border: `2px solid ${borderColor}`, borderRadius: 8, padding: 16, cursor: "pointer", display: "flex", flexDirection: "column", gap: 8, minHeight: 120 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ fontSize: 20 }}>{info.icon}</span>
        <span style={{ background: badge.bg, color: badge.color, borderRadius: 4, padding: "2px 8px", fontSize: 11, fontWeight: 700 }}>{badge.text}</span>
      </div>
      <div style={{ fontWeight: 700, fontSize: 14, color: "#ddd" }}>{info.label}</div>
      <div style={{ fontSize: 12, color: "#666" }}>{info.desc}</div>
    </div>
  );
}

// ===== ENGINE: 코치마크 =====

function Coachmark({ stepIndex, sim, dispatch, onSkip, onComplete, escapeToastVisible }) {
  const total = TRIAL_STEPS.length;
  const stepDef = TRIAL_STEPS[stepIndex];
  const [targetRect, setTargetRect] = useState(null);
  const bubbleRef = useRef(null);

  // 타겟 요소 rect 계산
  useEffect(() => {
    if (!stepDef || !stepDef.target) {
      setTargetRect(null);
      return;
    }
    function measure() {
      const el = document.getElementById(stepDef.target);
      if (el) {
        const r = el.getBoundingClientRect();
        setTargetRect({ top: r.top, left: r.left, width: r.width, height: r.height, bottom: r.bottom, right: r.right });
      } else {
        setTargetRect(null);
      }
    }
    measure();
    const id = setInterval(measure, 200);
    return () => clearInterval(id);
  }, [stepIndex, stepDef]);

  // state 조건 자동 전진
  useEffect(() => {
    if (!stepDef || stepDef.advanceOn !== "state") return;
    if (stepDef.check && stepDef.check(sim)) {
      setTimeout(() => onComplete(), 300);
    }
  }, [sim, stepIndex]);

  // 클릭 게이트 — target element 클릭 캡처로 전진
  useEffect(() => {
    if (!stepDef || !stepDef.target || !stepDef.advanceOn.startsWith("click:")) return;
    const targetId = stepDef.advanceOn.replace("click:", "");
    function handleClick(e) {
      const el = document.getElementById(targetId);
      if (el && (el === e.target || el.contains(e.target))) {
        setTimeout(() => onComplete(), 50);
      }
    }
    document.addEventListener("click", handleClick, true);
    return () => document.removeEventListener("click", handleClick, true);
  }, [stepIndex, stepDef]);

  const pad = 4;
  const cutout = targetRect ? {
    top: targetRect.top - pad,
    left: targetRect.left - pad,
    width: targetRect.width + pad * 2,
    height: targetRect.height + pad * 2,
  } : null;

  // 말풍선 위치 계산
  let bubbleTop = null;
  let bubbleLeft = null;
  if (cutout) {
    const winH = window.innerHeight;
    const cutBottom = cutout.top + cutout.height;
    if (cutBottom > winH * 0.65) {
      bubbleTop = Math.max(8, cutout.top - 180);
    } else {
      bubbleTop = cutout.top + cutout.height + 12;
    }
    bubbleLeft = Math.min(Math.max(8, cutout.left), window.innerWidth - 340);
  } else {
    bubbleTop = "50%";
    bubbleLeft = "50%";
  }

  // 클릭 통로 = z-lift 방식(리뷰 Critical 1): 오버레이(z-1000)가 전체를 덮으므로,
  // 통과시킬 요소를 position:relative + z-index:1003으로 오버레이 위에 올린다.
  // 통로 목록: 현재 단계 target + 두 탭바(target이 다른 페이지에 있을 때 이동 경로) + 비상구(static CSS).
  const liftIds = ["tabbar", "page-tabbar"];
  if (stepDef && stepDef.target && !liftIds.includes(stepDef.target)) liftIds.push(stepDef.target);
  const liftCss = liftIds
    .map((id) => `.coachmark-active #${id} { position: relative; z-index: 1003; }`)
    .join("\n");

  return (
    <>
      {/* 통로 z-lift 동적 스타일 */}
      <style>{liftCss}</style>

      {/* 디밍 오버레이 — 통로(z-lift된 요소) 밖 클릭은 전부 흡수 */}
      <div
        style={{
          position: "fixed", inset: 0, zIndex: 1000,
          background: "rgba(0,0,0,0.55)",
          pointerEvents: "auto",
        }}
        onClick={e => e.stopPropagation()}
      />

      {/* 컷아웃 — 타겟 요소 하이라이트 */}
      {cutout && (
        <div
          style={{
            position: "fixed",
            top: cutout.top,
            left: cutout.left,
            width: cutout.width,
            height: cutout.height,
            zIndex: 1001,
            boxShadow: "0 0 0 9999px rgba(0,0,0,0.55)",
            border: "2px solid #FBBF24",
            borderRadius: 6,
            pointerEvents: "none",
          }}
        />
      )}

      {/* 말풍선 */}
      <div
        ref={bubbleRef}
        style={{
          position: "fixed",
          top: typeof bubbleTop === "string" ? bubbleTop : bubbleTop,
          left: typeof bubbleLeft === "string" ? bubbleLeft : bubbleLeft,
          transform: (typeof bubbleTop === "string") ? "translate(-50%, -50%)" : "none",
          width: 320,
          background: "#FFFCF2",
          border: "2px solid #1A1A1A",
          borderRadius: 10,
          padding: 16,
          zIndex: 1002,
          boxShadow: "0 8px 32px rgba(0,0,0,0.5)",
          color: "#111",
          display: "flex",
          flexDirection: "column",
          gap: 12,
        }}
      >
        <div style={{ fontSize: 13, lineHeight: 1.65 }}>{stepDef && stepDef.text}</div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={{ fontSize: 12, color: "#888" }}>{stepIndex + 1} / {total}</span>
          <button
            style={{ fontSize: 12, color: "#888", background: "none", border: "none", cursor: "pointer", padding: "2px 8px" }}
            onClick={onSkip}
          >
            건너뛰기
          </button>
        </div>
      </div>

      {/* 비상구 토스트 */}
      {escapeToastVisible && (
        <div className="toast" style={{ zIndex: 1100 }}>
          실수해도 이 출구가 항상 있어요 — 지금은 연습이니 계속 가요!
        </div>
      )}
    </>
  );
}

        {/* 2장 예고 */}
        <div style={{ background: "#1A1A1A", border: "2px solid #333", borderRadius: 8, padding: 16, display: "flex", flexDirection: "column", gap: 8 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 18 }}>🔒</span>
            <span style={{ fontSize: 14, fontWeight: 900, color: "#888" }}>{CHAPTERS[1].title}</span>
          </div>
          <div style={{ fontSize: 13, color: "#666" }}>{CHAPTERS[1].teaser}</div>
        </div>

        <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
          <button className="btn-ghost" style={{ padding: "10px 24px" }} onClick={onRestart}>처음부터 다시</button>
          <button className="btn-action" style={{ padding: "10px 24px" }} onClick={onClose}>닫기</button>
        </div>
        <p style={{ fontSize: 11, color: "#555", textAlign: "center" }}>닫기 → 말풍선 없이 무대를 자유롭게 탐색해요</p>
      </div>
    </div>
  );
}

// ===== APP: 조립 =====

function App() {
  const [sim, dispatch] = useReducer(simReducer, initialSim);
  // welcome | running | celebrating | complete | free
  const [trialPhase, setTrialPhase] = useState("welcome");
  // step 0(환영)은 WelcomeOverlay가 담당 — [시작하기]가 곧 step 0의 전진 (리뷰 Critical 2)
  const [trialStep, setTrialStep] = useState(1);
  const [celebrating, setCelebrating] = useState(false);
  const [escapeToastVisible, setEscapeToastVisible] = useState(false);
  const prevStepRef = useRef(null);

  // 6→4 전환 시 축하 스트립 (실제 shouldCelebrate의 미러)
  useEffect(() => {
    const current = inferStep(sim);
    if (prevStepRef.current === 6 && current === 4) {
      setCelebrating(true);
      setTimeout(() => setCelebrating(false), 3000);
    }
    prevStepRef.current = current;
  }, [sim]);

  // celebrating 페이즈: 결정적 1.2초 후 완료 화면 — 레이스 없음 (리뷰 Important 4)
  useEffect(() => {
    if (trialPhase !== "celebrating") return;
    const t = setTimeout(() => setTrialPhase("complete"), 1200);
    return () => clearTimeout(t);
  }, [trialPhase]);

  function handleStart() {
    setTrialStep(1);
    setTrialPhase("running");
  }

  function handleCoachmarkComplete() {
    const next = trialStep + 1;
    if (next >= TRIAL_STEPS.length) {
      // 마지막 단계 완료 — 동기적으로 celebrating 전환(축하 스트립 1.2초) 후 완료 화면
      setTrialPhase("celebrating");
    } else {
      setTrialStep(next);
    }
  }

  function handleSkip() {
    // 건너뛰기: 확인 모달 없이 즉시 완료 화면 (spec §5)
    setTrialPhase("complete");
  }

  function handleRestart() {
    // 재시작: simState·트라이얼 인덱스 초기화, localStorage 미사용 (spec §5)
    dispatch({ type: "reset" });
    setTrialStep(1);
    setTrialPhase("welcome");
    setCelebrating(false);
  }

  function handleClose() {
    // 닫기: 오버레이만 닫고 자유 탐색 모드 — 말풍선 없이 무대 조작 가능 (spec Task 3 Step 1)
    setTrialPhase("free");
  }

  function handleEscapeClick() {
    // 비상구 예외: 3초 토스트, 진행 유지 (spec Task 2 Step 2 · Task 3)
    setEscapeToastVisible(true);
    setTimeout(() => setEscapeToastVisible(false), 3000);
  }

  const page = sim.page;

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", overflow: "hidden" }} className={(trialPhase === "running" || trialPhase === "celebrating") ? "coachmark-active" : ""}>
      {/* 상단 탭바 (STAGE_DEFS) */}
      <StageTabs activePage={page} dispatch={dispatch} />

      {/* 페이지 탭바 */}
      <PageTabs activePage={page} dispatch={dispatch} />

      {/* GuideStrip 미러 */}
      <GuideStrip sim={sim} dispatch={dispatch} celebrating={celebrating} onEscapeClick={handleEscapeClick} />

      {/* 화면 본문 */}
      <div style={{ flex: 1, overflow: "auto" }}>
        {page === "home" && <HomeScreen sim={sim} dispatch={dispatch} />}
        {page === "planning" && <PlanningScreen sim={sim} dispatch={dispatch} />}
        {page === "backups" && <BackupScreen sim={sim} dispatch={dispatch} />}
        {page === "code" && <CodeScreen sim={sim} dispatch={dispatch} trialStep={trialStep} />}
        {(page === "doctor" || page === "docs" || page === "logs" || page === "settings" || page === "manual") && (
          <div style={{ padding: 40, color: "#555", fontSize: 14, textAlign: "center" }}>이 화면은 연습장에서 생략됐어요 (실제 앱에는 있어요)</div>
        )}
      </div>

      {/* 오버레이 레이어 */}
      {trialPhase === "welcome" && <WelcomeOverlay onStart={handleStart} />}
      {(trialPhase === "running") && (
        <Coachmark
          stepIndex={trialStep}
          sim={sim}
          dispatch={dispatch}
          onSkip={handleSkip}
          onComplete={handleCoachmarkComplete}
          escapeToastVisible={escapeToastVisible}
        />
      )}
      {/* celebrating 페이즈: 코치마크 없이 축하 스트립만 1.2초 노출 후 complete로 전환 */}
      {trialPhase === "complete" && <CompletionOverlay onRestart={handleRestart} onClose={handleClose} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("app-root"));
root.render(<App />);
</script>
</body>
</html>
