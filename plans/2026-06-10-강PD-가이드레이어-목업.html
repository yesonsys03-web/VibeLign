    if(i+1 < lines.length){ setTimeout(()=>tick(i+1), 600); return; }

      S.starting = false; S.autoInit = true; S.coach = null; S.projName = "my-first-app"; // 자동 초기 저장 — 3️⃣ 완료로 치지 않음

// 현행 guide.ts의 inferStep 그대로 (충돌 시 뒤 단계 우선)
function inferStep(){
  let step = (!S.hasPlanDoc || S.planningPending) ? 2 : (!S.hasCheckpoint ? 3 : 4);
  const changed = S.isGit ? S.changedFiles : 0; // 비-git → 항상 0 (자동 5️⃣ 전환 없음)
  if(S.hasCheckpoint && changed > 0) step = (S.guardStatus === "ok") ? 6 : 5;
  return step;
}
function currentStep(){
  const inf = inferStep();
  if(S.override && S.override.base === inf) return S.override.step; // override 수명 규칙
  S.override = null;
  return inf;
}
function setOverride(step){ S.override = { step, base: inferStep() }; refresh(); }

  if(has("사진","갤러리","앨범","포토","gallery","photo")) return "#2D9CDB";
  if(has("타이머","뽀모도로","스톱워치","pomodoro","timer")) return "#E74C3C";
  if(has("습관","루틴","운동","habit","트래커","tracker")) return "#F5621E";
  if(has("블로그","글","게시","포스트","blog")) return "#1ABC9C";

}

// ───────── 사용자 행동: 작업방 (체크포인트→실행→검사 자동 시퀀스) ─────────
// AI 작업 출력(데모) — 주제에 종속.
function workLines(){
  return [
    `$ claude -p "기획안 적용: ${topicLabel()}"`,
    "· 핵심 파일 생성 — 기본 구조 잡기",
    "· 화면·데이터 연결",
    "· 기획안 범위대로 기능 추가",
    "✅ 작업 완료 — 3개 파일, 약속 범위 내",
  ];
}
function startWork(){
  if(S.aiToolMissing){ toast("⚠️ AI 도구가 없어요 — 작업방의 '설치 도움받기'를 눌러보세요"); refresh(); return; }
  if(!S.hasPlanDoc){ toast("⚠️ 확정된 기획안이 없어요 — 기획방에서 먼저 확정하세요"); return; }
  if(S.workRun && (S.workRun.phase==="checkpoint"||S.workRun.phase==="running"||S.workRun.phase==="guard")) return;
  const usedHandoff = S.handoff; S.handoff = null; // 핸드오프는 실행 시 소비
  S.workRun = { phase:"checkpoint", lines:[], handoff:usedHandoff };
  refresh();
  setTimeout(()=>{ // ① 체크포인트 자동 저장 (실패 시 실행 중단 — 데모는 항상 성공)
    S.hasCheckpoint = true; addBackup(`작업방 실행 전 자동 저장: "${topicLabel()}"`); S.changedFiles = 0; S.guardStatus = null;
    S.workRun.phase = "running"; toast("📌 체크포인트가 자동으로 저장됐어요 — 이제 망쳐도 되돌릴 수 있어요");
    refresh(); streamWork(0);
  }, 800);
}
function streamWork(i){
  const lines = workLines();
  if(i < lines.length){
    S.workRun.lines.push(lines[i]); refresh();
    setTimeout(()=>streamWork(i+1), 650);
    return;
  }
  S.workRun.phase = "guard"; S.changedFiles = 3; S.runVerified = false; S.runReady = false; refresh(); // ② 실행 종료 → 변경 감지
  setTimeout(()=>{ // ③ 자동 검사 (guard) — pass면 가이드가 바로 6️⃣로
    S.workRun.phase = "done"; S.guardStatus = "ok";
    toast("🛡️ 자동 검사: 통과 — 약속한 범위(3개 파일)만 바뀌었어요");
    refresh();
  }, 900);
}

// ───────── 사용자 행동: 실행해보기 ─────────
function startRun(){
  S.runStarted = true; S.runReady = false; refresh();

}
function verifyRun(){ S.runVerified = true; toast("✓ 작동 확인! 이제 백업 탭에서 마무리 저장만 하면 한 사이클 완성이에요"); refresh(); }

// ───────── 사용자 행동: 홈·백업 ─────────
function runGuard(){
  const changed = S.isGit ? S.changedFiles : 0;
  S.guardStatus = "ok"; // 데모: 엔진 verdict=pass 가정
  toast(changed > 0 ? "🛡️ 상태 확인: 통과 — 약속한 범위만 바뀌었어요" : "🛡️ 상태 확인: 통과 — 바뀐 게 없어요");

}
// 체크포인트 1건 기록(메모 포함) — 백업 타임라인에 주제 맥락이 남게.
function addBackup(note){ S.backupList.push({ note }); S.backups = S.backupList.length; }
function saveCheckpoint(){
  const prev = currentStep();
  const note = prev===6 ? `결과 저장: "${topicLabel()}" 작동 확인 후`
             : prev===3 ? `AI 작업 전 안전 저장: "${topicLabel()}"`
             : `수동 체크포인트: "${topicLabel()}"`;
  S.hasCheckpoint = true; addBackup(note);
  S.changedFiles = 0; S.guardStatus = null; // baseline 재캡처 → 변경 0
  toast("✅ 체크포인트가 저장됐어요");
  maybeCelebrate(prev);
  refresh();
}
function undoNow(){
  S.changedFiles = 0; S.guardStatus = null; S.runVerified = false; S.workRun = null;
  toast("↩ 마지막 체크포인트 시점으로 되돌렸어요 — 없던 일이 됐어요 (되돌리기 전 상태도 자동 보관)");

}
function extAiWork(n){
  if(inferStep() < 4){ toast("⚠️ 아직 4️⃣ 전이에요 — 기획·체크포인트부터!"); }
  const prevN = S.changedFiles;
  S.changedFiles = n;
  if(n > prevN) S.guardStatus = null; // 변경 "증가" 시에만 guard 리셋 (지문 변화 근사)
  S.runVerified = false;
  toast(S.isGit ? `📝 파일 ${n}개가 바뀌었어요 — 외부 작업은 검사가 자동이 아니니 '✓ 다 했어요'나 홈 '상태 확인'으로!` : "📝 파일이 바뀌었지만 비-git이라 자동 감지가 안 돼요 — 코드탐색의 '✓ 다 했어요'가 유일한 출구");
  refresh();
}

// 현행 GuideStrip.tsx 미니어처 — 온보딩과 같은 말풍선 톤(마스코트 🧭 + 크림 말풍선).
// 단계가 바뀐 순간에만 "뽁" 팝(popbubble) 재생 — 탭 전환·접기 같은 잔 렌더엔 흔들리지 않게.
let _lastStripStep; // 직전 표시 단계 추적 (pop 트리거)
function renderStrip(step){
  const el = document.getElementById("strip");
  const pop = step !== _lastStripStep; _lastStripStep = step;
  const popCls = pop ? " pop" : "";
  if(S.celebrating){
    el.innerHTML = `<div class="strip celebrate">
      <span class="mascot pop" style="background:#86EFAC">🎉</span>
      <span class="gbubble pop" style="background:#E8F6EC;border-color:#166534">
        <b>첫 사이클 완주!</b> 기획부터 저장까지 해냈어요 — 이 흐름 그대로 반복하면 돼요</span>
      <button class="chip ghost" onclick="S.celebrating=false;refresh()">×</button></div>`;
    _lastStripStep = undefined; // 축하 종료 후 복귀 시 다시 팝
    return;
  }
  const statusHtml = `<span class="${S.hasCheckpoint?"status-ok":"status-no"}">${S.hasCheckpoint?"✓ 백업 데이터 있음":"백업 데이터 없음"}</span>
    ${S.planningPending?'<span class="pending">● 기획 진행 중</span>':""}`;
  if(!step){ el.innerHTML = `<div class="strip thin"><span class="spacer"></span>${statusHtml}</div>`; _lastStripStep = undefined; return; }
  const d = STEPS[step];
  const onTarget = d.target && d.target === S.page;
  const goBtn = (d.target && !onTarget) ? `<button class="chip amber" onclick="go('${d.target}')">${d.go}</button>` : "";
  if(S.collapsed){
    el.innerHTML = `<div class="strip">
      <button class="chip ghost sq" title="안내 자세히 보기" onclick="S.collapsed=false;refresh()">▸</button>
      <span class="mascot${popCls}">🧭</span>
      <span class="gbubble${popCls}" style="display:flex;align-items:center;gap:8px">
        <span class="now">${d.icon} ${d.label}</span>${goBtn}</span></div>`;
    return;
  }
  // 폴백 affordance(현행과 동일): 4️⃣ + 코드탐색 탭에서만 — 작업방 경유는 자동 검사·전환이라 불필요
  let extra = "";
  if(step===4 && S.page==="code")
    extra += `<button class="chip outline" title="AI 작업이 끝났어도, 중간에 멈췄어도 눌러요 — 확인 단계로 가요" onclick="setOverride(5);go('home')">✓ 다 했어요 — 결과 확인</button>`;
  if(step===4 && S.page==="code" && S.aiToolMissing)
    extra += `<button class="chip outline" onclick="go('settings')">AI 도구가 없어요 — 설치 도움받기</button>`;
  let util = "";
  if(S.utilOpen){
    const escape = (step===4||step===5) ? `<button class="chip ghost" title="마지막으로 저장한 시점으로 코드를 되돌릴 수 있어요" onclick="go('backups')">잘 안 되면: 되돌리기</button><span class="divider"></span>` : "";
    util = `<div class="util">${escape}
      <button class="chip ghost sq" ${step===2?"disabled":""} onclick="setOverride(${step-1})">‹</button>
      <button class="chip ghost sq" ${step===6?"disabled":""} onclick="setOverride(${step+1})">›</button>
      <button class="chip ghost sq" title="가이드 끄기 (설정에서 다시 켤 수 있어요)" onclick="S.guideEnabled=false;refresh()">×</button>
      <span class="divider"></span>${statusHtml}</div>`;
  }
  el.innerHTML = `<div class="strip">
      <span class="mascot${popCls}">🧭</span>
      <span class="gbubble${popCls} col">
        <span style="display:flex;align-items:center;gap:6px">
          <button class="chip ghost sq" title="한 줄로 접기" onclick="S.collapsed=true;refresh()">▾</button>
          <span class="overline">지금 할 일:</span></span>
        <span><span class="now">${d.icon} ${d.label}</span> — ${d.short}</span>
        <span class="row">${goBtn}${extra}
          <button class="chip ghost" onclick="S.utilOpen=!S.utilOpen;refresh()">${S.utilOpen?"접기 ▴":"문제 있나요? ▾"}</button></span>
      </span>
      <span class="spacer"></span>${util}</div>`;
}

function cardState(stage, step){
  if(!step) return null;
  const ss = CARD_STEPS[stage];
  if(ss.includes(step)) return "now";
  if(ss.every(x=>x<step)) return "done";
  return "upcoming";
}

      S.hasPlanDoc ? ["ok",`권장 구조를 따르고 있어요 — ${pf.scope}`] : null,
      ["ok","민감정보(API 키 등) 노출이 없어요"],
      dirty ? ["warn",`${mod} 쪽 코드가 점점 커지고 있어요 — 구역(앵커)으로 나눠두면 더 안전해요`] : null,
    ].filter(Boolean);
    c.innerHTML = `<div class="panel first"><h3>🩺 진단</h3>
      <p style="color:#777">코드가 규칙대로 잘 정리됐는지 점검해요. 점수와 문제를 보고 자동 수정 계획(Plan)→적용(Apply)까지 할 수 있어요.</p>
      <div style="display:flex;align-items:baseline;gap:8px;margin-top:12px">
        <span style="font-size:32px;font-weight:800;color:${scoreColor}">${score}</span>
        <span style="color:#999">/ 100 — ${S.hasPlanDoc?`"${topicLabel()}"`:"프로젝트"} 건강 점수</span></div>
      <ul style="list-style:none;padding:0;margin:12px 0 0;display:grid;gap:7px;font-size:13px;line-height:1.6">
        ${checks.map(([k,t])=>`<li style="color:${k==="ok"?"#166534":"#B45309"}">${k==="ok"?"✓":"⚠"} ${t}</li>`).join("")}</ul>
      <button class="btn" onclick="toast('🩺 다시 검사했어요 — ${dirty?"경미한 제안 1건":"문제 없음, 깨끗해요"}')">다시 검사</button>
      ${dirty?`<button class="btn primary" onclick="toast('🛠 (데모) 자동 수정 계획을 만들어 적용해요 — ${mod} 구역 나누기')">자동 수정 계획(Plan)</button>`:""}
      </div>`;

  } else if(S.page==="logs"){
    const ran = S.runStarted || S.workRun;
    if(!ran){
      c.innerHTML = `<div class="panel first"><h3>📜 에러로그</h3><p>"${topicLabel()}"에서 난 오류를 모아 보는 곳이에요. 아직 기록된 오류가 없어요 — 작업방에서 AI를 실행하거나 실행해보기 ▶로 앱을 켜면 여기에 로그가 쌓여요.</p></div>`;
    } else {
      const mod = topicProfile().scope.split("·")[0].trim(); // 주제 핵심 모듈/화면
      const color = lv => ({info:"#9AA0A6",warn:"#FBBF24",error:"#ff8080",ok:"#4DFF91"})[lv];
      const lines = [
        ["info","10:32:01",`dev 서버 시작 — "${topicLabel()}" (http://localhost:5173)`],
        ["info","10:32:02",`${mod} 렌더 완료`],
        changed>0 ? ["info","10:32:04","기획안 범위대로 변경 적용됨 (파일 3개)"] : null,
        ["ok","10:32:05","심각한 오류: 0건 — 깨끗해요"],
      ].filter(Boolean);
      const body = lines.map(([lv,t,m])=>`<div><span style="color:#777">${t}</span> <span style="color:${color(lv)};font-weight:700">[${lv}]</span> ${m}</div>`).join("");
      c.innerHTML = `<div class="panel first"><h3>📜 에러로그</h3>
        <p style="color:#777">"${topicLabel()}"을 실행하며 쌓인 기록이에요. 빨간 <b style="color:#B91C1C">[error]</b>가 보이면 진단 탭에서 고치는 길을 안내해요.</p>
        <div class="term" style="margin-top:10px">${body}</div></div>`;
    }

  } else if(S.page==="manual"){
    const open = (S.accOpen === undefined) ? step : S.accOpen; // 진입 시 현재 단계 자동 펼침
    let h = `<div class="howto-wrap"><div class="howto-title">📖 순서대로 따라하기 — 기획 → 코딩 → 확인 → 저장, 이 여섯 칸만 돌면 돼요</div>`;
    for(let i=1;i<=6;i++){
      const d = STEPS[i]; const isCur = step===i; const isOpen = open===i;
      h += `<div class="acc ${isCur?"current":""}">
        <button class="acc-head" onclick="toggleAcc(${i})">
          ${d.icon} <b>${d.label}</b> — <span class="short">${d.short}</span><span class="arrow">${isOpen?"▾":"▸"}</span></button>
        ${isOpen?`<div class="acc-body">${d.howto.join("<br>")}${d.target?`<br><button class="chip" onclick="go('${d.target}')">지금 하러 가기 → ${pageLabel(d.target)}</button>`:""}</div>`:""}</div>`;
    }
    h += `</div><div class="panel" style="margin-top:10px"><h3>명령어 사전</h3><p>체크포인트(안전 저장) · 되돌리기(없던 일로) · 상태 확인(약속 범위 검사) · 작업방(AI에게 시키기) · 실행해보기(직접 켜보기) · 코드맵 · 앵커 … (기존 사전 그대로 이 아래에)</p></div>`;
    c.innerHTML = h;

  } else if(S.page==="settings"){
    c.innerHTML = `<div class="panel first"><h3>초보자 가이드</h3>
      <p>화면 상단에 "지금 할 일 → 다음 행동"을 안내하는 가이드 줄과 홈 카드의 차례 표시를 보여줍니다. 익숙해지면 꺼도 좋아요.</p>
      <button class="btn ${S.guideEnabled?"primary":""}" onclick="S.guideEnabled=!S.guideEnabled;refresh()">${S.guideEnabled?"ON":"OFF"}</button></div>
      <div class="panel"><h3>AI 도구 설정 ${S.aiToolMissing?'<span class="badge-now">설치 필요</span>':""}</h3>
      <p>${S.aiToolMissing?"설치된 AI 도구가 없어요. Claude Code 설치를 도와드릴게요.":"✓ Claude Code 감지됨 — 작업방이 이 도구로 AI를 실행해요"}</p>
      ${S.aiToolMissing?'<button class="btn primary" onclick="installClaude()">Claude Code 설치 시작</button>':""}</div>
      <div class="panel"><h3>MCP 자동 설정</h3>
      <p>온보딩에서 고른 도구에 VibeLign MCP(코드맵·앵커·검사·백업)가 연결돼 있어요. 도구를 새로 설치했다면 여기서 다시 연결할 수 있어요. <span style="color:#999">(설치된 도구는 자동 선택돼요)</span></p></div>`;

  } else {
    c.innerHTML = `<div class="panel first"><p>(${S.page} — 목업 생략)</p></div>`;
  }
}

function renderSignals(step){
  const changed = S.isGit ? S.changedFiles : 0;
  document.getElementById("signals").textContent = S.page==="onboard"
    ? `onboarding → dirPicked:${S.dirPicked} prompt:"${S.promptText.slice(0,20)}…" tools:[${Array.from(toolSel()).join(",")}] claude:${S.aiToolMissing?"미설치":"준비됨"} recent:${S.recent.length}개`
    : `signals → hasPlanDoc:${S.hasPlanDoc} hasCheckpoint(수동):${S.hasCheckpoint} autoInit:${S.autoInit} changedSinceCheckpoint:${S.isGit?changed:"0(비-git)"} guard:${S.guardStatus??"null"} runVerified:${S.runVerified} handoff:${S.handoff?"있음":"없음"} | inferStep:${inferStep()} override:${S.override?S.override.step:"없음"} → 표시 단계:${step??"가이드 OFF"}`;
}

resetDemo();
</script>
</body>
</html>
