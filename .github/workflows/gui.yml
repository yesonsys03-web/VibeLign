name: GUI CI

on:
  push:
    paths:
      - "vibelign-gui/**"
      - ".github/workflows/gui.yml"
      - "vibelign/**"
      - "pyproject.toml"
      - "vib.spec"
  pull_request:
    paths:
      - "vibelign-gui/**"
      - ".github/workflows/gui.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      # GitHub Actions 기본 CI=1 때문에 tauri-cli가 `--ci`에 숫자를 넣는 식으로 깨질 수 있어요.
      # 로컬에서 `CI=false`로 해결됐던 경로를 그대로 맞춥니다.
      CI: "false"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest    # Apple Silicon (aarch64)
          - os: macos-13        # Intel (x86_64)

    defaults:
      run:
        working-directory: vibelign-gui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vibelign-gui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            patchelf \
            rpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'macOS' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build vib sidecar binary
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          pip install pyinstaller
          pip install -e .
          mkdir -p vibelign-gui/src-tauri/binaries
          pyinstaller vib.spec --distpath dist-vib --noconfirm
          TRIPLE=$(rustc -vV | sed -n 's/^host: //p')
          EXT=""
          if [[ "$TRIPLE" == *"windows"* ]]; then EXT=".exe"; fi
          cp "dist-vib/vib${EXT}" "vibelign-gui/src-tauri/binaries/vib-${TRIPLE}${EXT}"
          cp "dist-vib/vib${EXT}" "vibelign-gui/src-tauri/binaries/vib${EXT}"
          # macOS universal2 빌드를 위해 x86_64 사이드카가 레포에 커밋되어 있어야 합니다.
          # 없으면 Intel Mac에서 사이드카 실행 불가 (앱은 열림).
          if [[ "$RUNNER_OS" == "macOS" ]] && [[ ! -f "vibelign-gui/src-tauri/binaries/vib-x86_64-apple-darwin" ]]; then
            echo "WARNING: vib-x86_64-apple-darwin not found. Intel Mac sidecar will not work."
            echo "Run locally on Intel Mac: pyinstaller vib.spec --distpath dist-vib --noconfirm"
            echo "Then commit: vibelign-gui/src-tauri/binaries/vib-x86_64-apple-darwin"
          fi

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vibelign-gui/src-tauri

      - name: Build Tauri app
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            npm run tauri build -- --target universal-apple-darwin
          else
            npm run tauri build
          fi

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: vibelign-gui-linux
          path: |
            vibelign-gui/src-tauri/target/release/bundle/deb/*.deb
            vibelign-gui/src-tauri/target/release/bundle/appimage/*.AppImage
            vibelign-gui/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vibelign-gui-windows
          path: |
            vibelign-gui/src-tauri/target/release/bundle/nsis/*.exe
            vibelign-gui/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: vibelign-gui-macos-${{ matrix.os }}
          path: |
            vibelign-gui/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            vibelign-gui/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: warn
