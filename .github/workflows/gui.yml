name: GUI CI

on:
  push:
    paths:
      - "vibelign-gui/**"
      - ".github/workflows/gui.yml"
  pull_request:
    paths:
      - "vibelign-gui/**"
      - ".github/workflows/gui.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20]

    defaults:
      run:
        working-directory: vibelign-gui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: vibelign-gui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vibelign-gui/src-tauri

      - name: Check Tauri backend
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml
