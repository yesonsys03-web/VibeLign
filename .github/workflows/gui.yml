name: GUI CI

on:
  push:
    paths:
      - "vibelign-gui/**"
      - ".github/workflows/gui.yml"
      - "vibelign/**"
      - "pyproject.toml"
      - "vib.spec"
  pull_request:
    paths:
      - "vibelign-gui/**"
      - ".github/workflows/gui.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      # GitHub Actions 기본 CI=1 때문에 tauri-cli가 `--ci`에 숫자를 넣는 식으로 깨질 수 있어요.
      # 로컬에서 `CI=false`로 해결됐던 경로를 그대로 맞춥니다.
      CI: "false"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20]

    defaults:
      run:
        working-directory: vibelign-gui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: vibelign-gui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            patchelf \
            rpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build vib sidecar binary
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          pip install pyinstaller
          pip install -e .
          pyinstaller vib.spec --distpath dist-vib --noconfirm
          TRIPLE=$(rustc -vV | sed -n 's/^host: //p')
          EXT=""
          if [[ "$TRIPLE" == *"windows"* ]]; then EXT=".exe"; fi
          mkdir -p vibelign-gui/src-tauri/binaries
          # 기존(트리플) 파일명도 유지하지만,
          # Tauri는 외부 바이너리를 번들로 넣고(preset: binaries/vib),
          # 앱 실행 시에는 vib.exe/vib도 같이 찾아요.
          cp "dist-vib/vib${EXT}" "vibelign-gui/src-tauri/binaries/vib-${TRIPLE}${EXT}"
          cp "dist-vib/vib${EXT}" "vibelign-gui/src-tauri/binaries/vib${EXT}"
          cp "dist-vib/vib${EXT}" "vibelign-gui/src-tauri/binaries/vib"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vibelign-gui/src-tauri

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: vibelign-gui-linux
          path: |
            vibelign-gui/src-tauri/target/release/bundle/deb/*.deb
            vibelign-gui/src-tauri/target/release/bundle/appimage/*.AppImage
            vibelign-gui/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vibelign-gui-windows
          path: |
            vibelign-gui/src-tauri/target/release/bundle/nsis/*.exe
            vibelign-gui/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: vibelign-gui-macos
          path: |
            vibelign-gui/src-tauri/target/release/bundle/dmg/*.dmg
            vibelign-gui/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn
