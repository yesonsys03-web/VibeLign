name: GUI CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
    tags:
      - "v*.*.*"
    paths:
      - "vibelign-gui/**"
      - ".github/workflows/gui.yml"
      - "vibelign/**"
      - "pyproject.toml"
      - "vib.spec"
  pull_request:
    paths:
      - "vibelign-gui/**"
      - ".github/workflows/gui.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      # GitHub Actions 기본 CI=1 때문에 tauri-cli가 `--ci`에 숫자를 넣는 식으로 깨질 수 있어요.
      # 로컬에서 `CI=false`로 해결됐던 경로를 그대로 맞춥니다.
      CI: "false"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest    # Apple Silicon (aarch64) 네이티브 빌드

    defaults:
      run:
        working-directory: vibelign-gui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vibelign-gui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build vib onedir runtime
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          pip install pyinstaller
          pip install -e .
          pyinstaller vib.spec --distpath dist-vib --noconfirm
          # onedir 산출물 전체를 Tauri resources 로 번들링할 경로에 복사한다.
          # Why: onefile PyInstaller 는 매 실행마다 $TMPDIR/_MEI{pid}/ 로 재압축 해제해 1~3초
          #      콜드스타트가 발생했다. onedir 는 설치 시점에 한 번만 풀려 있어 이후 모든
          #      Doctor/DocsViewer 호출이 dev 모드 수준의 즉시 반응을 보인다.
          rm -rf vibelign-gui/src-tauri/vib-runtime
          mkdir -p vibelign-gui/src-tauri
          cp -R dist-vib/vib vibelign-gui/src-tauri/vib-runtime

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vibelign-gui/src-tauri

      - name: Configure updater plugin for release build
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          if [[ -z "${TAURI_UPDATER_PUBKEY}" ]]; then
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
            "pubkey": os.environ["TAURI_UPDATER_PUBKEY"],
            "endpoints": [
              f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/latest/download/latest.json"
            ],
          }
          config = {
            "bundle": {
              "createUpdaterArtifacts": True
            },
            "plugins": {
              "updater": payload
            }
          }
          Path("src-tauri/tauri.updater.generated.conf.json").write_text(
            json.dumps(config, indent=2),
            encoding="utf-8",
          )
          PY

      - name: Build Tauri app
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          BUILD_CMD="npm run tauri build"
          export VITE_APP_UPDATER_ENABLED=false
          if [[ "${GITHUB_REF}" == refs/tags/v* ]] && [[ -n "${TAURI_SIGNING_PRIVATE_KEY}" ]] && [[ -n "${TAURI_UPDATER_PUBKEY:-}" ]]; then
            export VITE_APP_UPDATER_ENABLED=true
            BUILD_CMD="npm run tauri build -- --features updater --config src-tauri/tauri.updater.generated.conf.json"
          fi
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            success=false
            for i in 1 2 3; do
              if eval "$BUILD_CMD"; then
                success=true
                break
              fi
              if [[ "$i" -lt 3 ]]; then
                echo "Attempt $i failed, retrying in 10s..."
                sleep 10
              fi
            done
            if [[ "$success" != true ]]; then
              echo "Tauri build failed after 3 attempts"
              exit 1
            fi
          else
            eval "$BUILD_CMD"
          fi

      - name: Ad-hoc codesign macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP=$(find src-tauri/target -path "*/release/bundle/macos/*.app" -print -quit 2>/dev/null || true)
          if [ -n "$APP" ]; then
            codesign --force --deep --sign - "$APP"
            echo "Signed: $APP"
          else
            echo "No macOS .app bundle found under src-tauri/target; skipping ad-hoc codesign"
          fi

      - name: Prepare Windows release package
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p windows-release
          cp -f src-tauri/target/release/bundle/nsis/*.exe windows-release/ 2>/dev/null || true
          cp -f src-tauri/target/release/bundle/nsis/*.exe.sig windows-release/ 2>/dev/null || true

      - name: Generate Windows updater manifest
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]] || [[ -z "${TAURI_UPDATER_PUBKEY}" ]]; then
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path("windows-release")
          candidates = sorted(root.glob("*.exe"))
          if not candidates:
              raise SystemExit("No Windows updater EXE found")
          asset = candidates[0]
          sig = Path(f"{asset}.sig")
          if not sig.exists():
              raise SystemExit(f"Missing Windows signature for {asset.name}")

          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          payload = {
              "version": version,
              "notes": "See GitHub release notes for details.",
              "platforms": {
                  "windows-x86_64": {
                      "signature": sig.read_text(encoding="utf-8").strip(),
                      "url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/download/{os.environ['GITHUB_REF_NAME']}/{asset.name}",
                  }
              },
          }
          (root / "latest.windows.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")
          PY

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vibelign-gui-windows
          path: vibelign-gui/windows-release/
          if-no-files-found: warn

      - name: Prepare macOS release package
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p macos-release
          find src-tauri/target -path "*/release/bundle/dmg/*.dmg" -exec cp -f {} macos-release/ \; 2>/dev/null || true
          find src-tauri/target -path "*/release/bundle/macos/*.app.tar.gz" -exec cp -f {} macos-release/ \; 2>/dev/null || true
          find src-tauri/target -path "*/release/bundle/macos/*.app.tar.gz.sig" -exec cp -f {} macos-release/ \; 2>/dev/null || true
          # NOTE: .app 디렉토리 번들은 복사하지 않는다. 디렉토리라서 `**/*` 글롭에
          # 내부 수백 개 파일이 Release 에셋으로 흘러들어가고, 그중 0바이트 파일이
          # GitHub API 422 (size >= 1) 를 유발. .dmg 안에 이미 .app 이 포함됨.
          printf '#!/bin/bash\n# VibeLign macOS 설치 스크립트\nset -e\nAPP_NAME="vibelign-gui.app"\nSEARCH_DIRS=("$HOME/Downloads" "$HOME/Desktop" "$(dirname "$0")")\necho "VibeLign 앱 찾는 중..."\nAPP_PATH=""\nfor DIR in "${SEARCH_DIRS[@]}"; do\n  if [ -d "$DIR/$APP_NAME" ]; then APP_PATH="$DIR/$APP_NAME"; break; fi\ndone\nif [ -z "$APP_PATH" ]; then\n  echo "오류: $APP_NAME 을 찾을 수 없습니다. Downloads 또는 Desktop 에 앱을 먼저 옮겨 주세요."\n  exit 1\nfi\necho "발견: $APP_PATH"\necho "macOS 격리 속성 제거 중..."\nxattr -rc "$APP_PATH"\necho "/Applications 로 복사 중..."\ncp -r "$APP_PATH" /Applications/\necho "설치 완료! VibeLign을 실행합니다."\nopen /Applications/$APP_NAME\n' > macos-release/install-macos.sh
          chmod +x macos-release/install-macos.sh
          printf 'VibeLign - macOS 설치 안내\n==========================\n\n처음 실행 시 "앱이 손상되었습니다" 오류가 뜨는 경우:\n\n방법 1 - 설치 스크립트 사용 (권장)\n  터미널에서 실행:\n  bash install-macos.sh\n\n방법 2 - 수동 해결\n  터미널에서 실행:\n  xattr -rc vibelign-gui.app\n  그 후 앱을 /Applications 폴더로 이동\n\n이 오류는 Apple 공증(notarization) 없이 배포된 앱에서\nmacOS Gatekeeper가 발생시키는 정상적인 보안 경고입니다.\n' > macos-release/README.txt

      - name: Generate macOS updater manifest
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]] || [[ -z "${TAURI_UPDATER_PUBKEY}" ]]; then
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path("macos-release")
          candidates = sorted(root.glob("*.app.tar.gz"))
          if not candidates:
              raise SystemExit("No macOS updater archive found")
          asset = candidates[0]
          sig = Path(f"{asset}.sig")
          if not sig.exists():
              raise SystemExit(f"Missing macOS signature for {asset.name}")

          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          payload = {
              "version": version,
              "notes": "See GitHub release notes for details.",
              "platforms": {
                  "darwin-aarch64": {
                      "signature": sig.read_text(encoding="utf-8").strip(),
                      "url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/download/{os.environ['GITHUB_REF_NAME']}/{asset.name}",
                  }
              },
          }
          (root / "latest.macos.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")
          PY

      - name: Upload macOS artifacts (Apple Silicon)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: vibelign-gui-macos-arm64
          path: vibelign-gui/macos-release/
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: vibelign-gui-windows
          path: release-assets/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: vibelign-gui-macos-arm64
          path: release-assets/macos

      - name: Merge updater manifests
        shell: bash
        run: |
          if [[ ! -f release-assets/windows/latest.windows.json && ! -f release-assets/macos/latest.macos.json ]]; then
            exit 0
          fi
          python - <<'PY'
          import json
          from pathlib import Path

          manifest_paths = [
            Path("release-assets/windows/latest.windows.json"),
            Path("release-assets/macos/latest.macos.json"),
          ]
          version = None
          notes = "See GitHub release notes for details."
          platforms = {}

          for path in manifest_paths:
            if not path.exists():
              continue
            payload = json.loads(path.read_text(encoding="utf-8"))
            version = version or payload.get("version")
            notes = payload.get("notes") or notes
            platforms.update(payload.get("platforms", {}))

          if not version or not platforms:
            raise SystemExit("Missing updater manifest fragments")

          output = {
            "version": version,
            "notes": notes,
            "platforms": platforms,
          }
          Path("release-assets/latest.json").write_text(json.dumps(output, indent=2), encoding="utf-8")
          PY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/windows/**/*.exe
            release-assets/windows/**/*.sig
            release-assets/macos/**/*.dmg
            release-assets/macos/**/*.app.tar.gz
            release-assets/macos/**/*.sig
            release-assets/macos/install-macos.sh
            release-assets/macos/README.txt
            release-assets/latest.json
          generate_release_notes: true
          fail_on_unmatched_files: false
