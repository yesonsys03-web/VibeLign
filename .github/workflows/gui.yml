name: GUI CI

on:
  push:
    paths:
      - "vibelign-gui/**"
      - ".github/workflows/gui.yml"
      - "vibelign/**"
      - "pyproject.toml"
      - "vib.spec"
  pull_request:
    paths:
      - "vibelign-gui/**"
      - ".github/workflows/gui.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      # GitHub Actions 기본 CI=1 때문에 tauri-cli가 `--ci`에 숫자를 넣는 식으로 깨질 수 있어요.
      # 로컬에서 `CI=false`로 해결됐던 경로를 그대로 맞춥니다.
      CI: "false"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest    # Apple Silicon (aarch64) 네이티브 빌드

    defaults:
      run:
        working-directory: vibelign-gui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vibelign-gui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            patchelf \
            rpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build vib sidecar binary
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          pip install pyinstaller
          pip install -e .
          mkdir -p vibelign-gui/src-tauri/binaries
          pyinstaller vib.spec --distpath dist-vib --noconfirm
          TRIPLE=$(rustc -vV | sed -n 's/^host: //p')
          EXT=""
          if [[ "$TRIPLE" == *"windows"* ]]; then EXT=".exe"; fi
          cp "dist-vib/vib${EXT}" "vibelign-gui/src-tauri/binaries/vib-${TRIPLE}${EXT}"
          cp "dist-vib/vib${EXT}" "vibelign-gui/src-tauri/binaries/vib${EXT}"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vibelign-gui/src-tauri

      - name: Build Tauri app
        shell: bash
        run: npm run tauri build

      - name: Ad-hoc codesign macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP=$(find src-tauri/target/release/bundle/macos -name "*.app" | head -1)
          if [ -n "$APP" ]; then
            codesign --force --deep --sign - "$APP"
            echo "Signed: $APP"
          fi

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: vibelign-gui-linux
          path: |
            vibelign-gui/src-tauri/target/release/bundle/deb/*.deb
            vibelign-gui/src-tauri/target/release/bundle/appimage/*.AppImage
            vibelign-gui/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vibelign-gui-windows
          path: |
            vibelign-gui/src-tauri/target/release/bundle/nsis/*.exe
            vibelign-gui/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Prepare macOS release package
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p macos-release
          cp -r src-tauri/target/release/bundle/dmg/*.dmg macos-release/ 2>/dev/null || true
          cp -r src-tauri/target/release/bundle/macos/*.app macos-release/ 2>/dev/null || true
          cp scripts/install-macos.sh macos-release/
          chmod +x macos-release/install-macos.sh
          cat > macos-release/README.txt << 'EOF'
VibeLign - macOS 설치 안내
==========================

처음 실행 시 "앱이 손상되었습니다" 오류가 뜨는 경우:

방법 1 - 설치 스크립트 사용 (권장)
  터미널에서 실행:
  bash install-macos.sh

방법 2 - 수동 해결
  터미널에서 실행:
  xattr -rc vibelign-gui.app
  그 후 앱을 /Applications 폴더로 이동

이 오류는 Apple 공증(notarization) 없이 배포된 앱에서
macOS Gatekeeper가 발생시키는 정상적인 보안 경고입니다.
EOF

      - name: Upload macOS artifacts (Apple Silicon)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: vibelign-gui-macos-arm64
          path: vibelign-gui/macos-release/
          if-no-files-found: warn
