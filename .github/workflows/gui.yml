name: GUI CI

on:
  push:
    paths:
      - "vibelign-gui/**"
      - ".github/workflows/gui.yml"
      - "vibelign/**"
      - "pyproject.toml"
      - "vib.spec"
  pull_request:
    paths:
      - "vibelign-gui/**"
      - ".github/workflows/gui.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20]

    defaults:
      run:
        working-directory: vibelign-gui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: vibelign-gui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build vib sidecar binary
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          pip install pyinstaller
          pip install -e .
          pyinstaller vib.spec --distpath dist-vib --noconfirm
          TRIPLE=$(rustc -vV | sed -n 's/^host: //p')
          EXT=""
          if [[ "$TRIPLE" == *"windows"* ]]; then EXT=".exe"; fi
          mkdir -p vibelign-gui/src-tauri/binaries
          cp "dist-vib/vib${EXT}" "vibelign-gui/src-tauri/binaries/vib-${TRIPLE}${EXT}"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vibelign-gui/src-tauri

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: vibelign-gui-linux
          path: |
            vibelign-gui/src-tauri/target/release/bundle/deb/*.deb
            vibelign-gui/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vibelign-gui-windows
          path: |
            vibelign-gui/src-tauri/target/release/bundle/nsis/*.exe
            vibelign-gui/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
