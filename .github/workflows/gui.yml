name: GUI CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
    tags:
      - "v*.*.*"
    paths:
      - "vibelign-gui/**"
      - "vibelign-core/**"
      - ".github/workflows/gui.yml"
      - "vibelign/**"
      - "pyproject.toml"
      - "vib.spec"
  pull_request:
    paths:
      - "vibelign-gui/**"
      - "vibelign-core/**"
      - ".github/workflows/gui.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "빌드 대상 OS (수동 실행 시)"
        type: choice
        default: all
        options:
          - all
          - windows
          - macos

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      # GitHub Actions 기본 CI=1 때문에 tauri-cli가 `--ci`에 숫자를 넣는 식으로 깨질 수 있어요.
      # 로컬에서 `CI=false`로 해결됐던 경로를 그대로 맞춥니다.
      CI: "false"
    strategy:
      fail-fast: false
      # 수동 실행(workflow_dispatch)에서 target=windows/macos 면 해당 OS만 빌드한다.
      # push/PR 등 inputs 가 없는 이벤트는 빈 문자열이라 기본값(전부)으로 떨어진다.
      # macOS 는 2종을 빌드한다:
      #   - macos-latest = Apple Silicon / aarch64 네이티브
      #   - macos-13     = Intel / x86_64 네이티브
      # PyInstaller(vib-runtime)는 호스트 아키텍처로만 빌드되어 크로스컴파일 불가하므로
      # Intel 산출물은 반드시 Intel 네이티브 러너(macos-13)에서 만들어야 한다.
      matrix:
        os: ${{ fromJSON(github.event.inputs.target == 'windows' && '["windows-latest"]' || github.event.inputs.target == 'macos' && '["macos-latest","macos-13"]' || '["windows-latest","macos-latest","macos-13"]') }}

    defaults:
      run:
        working-directory: vibelign-gui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # macOS 잡은 러너 아키텍처에 따라 업데이터 platform 키와 에셋 라벨이 달라진다.
      # macos-latest(arm64) → darwin-aarch64 / aarch64,  macos-13(x86_64) → darwin-x86_64 / x64.
      # 여기서 $GITHUB_ENV 에 심으면 이후 모든 스텝의 ${{ env.* }} / os.environ 에서 쓸 수 있다.
      - name: Determine macOS arch (updater key + asset label)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [[ "$(uname -m)" == "arm64" ]]; then
            echo "MAC_UPDATER_KEY=darwin-aarch64" >> "$GITHUB_ENV"
            echo "MAC_ARCH_LABEL=aarch64" >> "$GITHUB_ENV"
          else
            echo "MAC_UPDATER_KEY=darwin-x86_64" >> "$GITHUB_ENV"
            echo "MAC_ARCH_LABEL=x64" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vibelign-gui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust checkpoint sidecar
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          cargo build --manifest-path vibelign-core/Cargo.toml --release
          mkdir -p vibelign/_bundled
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp -f vibelign-core/target/release/vibelign-engine.exe vibelign/_bundled/vibelign-engine.exe
            sha256sum vibelign/_bundled/vibelign-engine.exe > vibelign/_bundled/vibelign-engine.exe.sha256
          else
            cp -f vibelign-core/target/release/vibelign-engine vibelign/_bundled/vibelign-engine
            shasum -a 256 vibelign/_bundled/vibelign-engine > vibelign/_bundled/vibelign-engine.sha256
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build vib onedir runtime
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          pip install pyinstaller
          # report extra(python-docx/pptx)까지 설치해야 vib.spec 의 collect_all 이
          # Word/PPT 렌더러를 번들에 포함한다. 빠지면 GUI 보고서 내보내기가 실패한다.
          pip install -e ".[report]"
          pyinstaller vib.spec --distpath dist-vib --noconfirm
          # onedir 산출물 전체를 Tauri resources 로 번들링할 경로에 복사한다.
          # Why: onefile PyInstaller 는 매 실행마다 $TMPDIR/_MEI{pid}/ 로 재압축 해제해 1~3초
          #      콜드스타트가 발생했다. onedir 는 설치 시점에 한 번만 풀려 있어 이후 모든
          #      Doctor/DocsViewer 호출이 dev 모드 수준의 즉시 반응을 보인다.
          rm -rf vibelign-gui/src-tauri/vib-runtime
          mkdir -p vibelign-gui/src-tauri
          cp -R dist-vib/vib vibelign-gui/src-tauri/vib-runtime

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            vibelign-gui/src-tauri
            vibelign-core

      - name: Configure updater plugin for release build
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          if [[ -z "${TAURI_UPDATER_PUBKEY}" ]]; then
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
            "pubkey": os.environ["TAURI_UPDATER_PUBKEY"],
            "endpoints": [
              f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/latest/download/latest.json"
            ],
          }
          config = {
            "bundle": {
              "createUpdaterArtifacts": True
            },
            "plugins": {
              "updater": payload
            }
          }
          Path("src-tauri/tauri.updater.generated.conf.json").write_text(
            json.dumps(config, indent=2),
            encoding="utf-8",
          )
          PY

      - name: Build Tauri app
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          BUILD_CMD="npm run tauri build"
          export VITE_APP_UPDATER_ENABLED=false
          if [[ "${GITHUB_REF}" == refs/tags/v* ]] && [[ -n "${TAURI_SIGNING_PRIVATE_KEY}" ]] && [[ -n "${TAURI_UPDATER_PUBKEY:-}" ]]; then
            export VITE_APP_UPDATER_ENABLED=true
            BUILD_CMD="npm run tauri build -- --features updater --config src-tauri/tauri.updater.generated.conf.json"
          fi
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            success=false
            for i in 1 2 3; do
              if eval "$BUILD_CMD"; then
                success=true
                break
              fi
              if [[ "$i" -lt 3 ]]; then
                echo "Attempt $i failed, retrying in 10s..."
                sleep 10
              fi
            done
            if [[ "$success" != true ]]; then
              echo "Tauri build failed after 3 attempts"
              exit 1
            fi
          else
            eval "$BUILD_CMD"
          fi

      - name: Ad-hoc codesign macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP=$(find src-tauri/target -path "*/release/bundle/macos/*.app" -print -quit 2>/dev/null || true)
          if [ -n "$APP" ]; then
            codesign --force --deep --sign - "$APP"
            echo "Signed: $APP"
            # codesign --deep 가 bundled vibelign-engine 의 끝에 서명 blob 을 추가해
            # 사전 생성된 .sha256 manifest 와 hash 가 어긋난다. 사이드카 manifest 를
            # 재생성해서 vibelign 의 integrity check (discovery.py:_verify_integrity) 가
            # 통과하도록 한다. 누락 시 GUI 의 `vib history` 등 Rust 엔진 호출이
            # RUST_ENGINE_INTEGRITY_FAILED 로 폭발.
            ENGINE_PATH="$APP/Contents/Resources/vib-runtime/_internal/vibelign/_bundled/vibelign-engine"
            if [ -f "$ENGINE_PATH" ]; then
              ENGINE_DIGEST=$(shasum -a 256 "$ENGINE_PATH" | awk '{print $1}')
              printf '%s  vibelign-engine\n' "$ENGINE_DIGEST" > "$ENGINE_PATH.sha256"
              echo "Refreshed manifest: $ENGINE_PATH.sha256 ($ENGINE_DIGEST)"
            else
              echo "WARN: bundled vibelign-engine not found under signed app; skipping manifest refresh" >&2
            fi
          else
            echo "No macOS .app bundle found under src-tauri/target; skipping ad-hoc codesign"
          fi

      - name: Prepare Windows release package
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p windows-release
          cp -f src-tauri/target/release/bundle/nsis/*.exe windows-release/ 2>/dev/null || true
          cp -f src-tauri/target/release/bundle/nsis/*.exe.sig windows-release/ 2>/dev/null || true

      - name: Generate Windows updater manifest
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]] || [[ -z "${TAURI_UPDATER_PUBKEY}" ]]; then
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path("windows-release")
          app_version = json.loads(Path("src-tauri/tauri.conf.json").read_text(encoding="utf-8"))["version"]
          candidates = sorted(root.glob("*.exe"))
          if not candidates:
              raise SystemExit("No Windows updater EXE found")
          asset = candidates[0]
          sig = Path(f"{asset}.sig")
          if not sig.exists():
              raise SystemExit(f"Missing Windows signature for {asset.name}")

          payload = {
              "version": app_version,
              "notes": "See GitHub release notes for details.",
              "platforms": {
                  "windows-x86_64": {
                      "signature": sig.read_text(encoding="utf-8").strip(),
                      "url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/download/{os.environ['GITHUB_REF_NAME']}/{asset.name}",
                  }
              },
          }
          (root / "latest.windows.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")
          PY

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vibelign-gui-windows
          path: vibelign-gui/windows-release/
          if-no-files-found: warn

      - name: Prepare macOS release package
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p macos-release
          find src-tauri/target -path "*/release/bundle/dmg/*.dmg" -exec cp -f {} macos-release/ \; 2>/dev/null || true
          find src-tauri/target -path "*/release/bundle/macos/*.app.tar.gz" -exec cp -f {} macos-release/ \; 2>/dev/null || true
          find src-tauri/target -path "*/release/bundle/macos/*.app.tar.gz.sig" -exec cp -f {} macos-release/ \; 2>/dev/null || true
          # NOTE: .app 디렉토리 번들은 복사하지 않는다. 디렉토리라서 `**/*` 글롭에
          # 내부 수백 개 파일이 Release 에셋으로 흘러들어가고, 그중 0바이트 파일이
          # GitHub API 422 (size >= 1) 를 유발. .dmg 안에 이미 .app 이 포함됨.
          #
          # .app.tar.gz / .sig 는 arch 무관하게 둘 다 vibelign-gui.app.tar.gz 로 동일한 이름이라
          # arm64/Intel 두 잡이 같은 릴리즈 에셋 이름으로 충돌한다. arch 라벨을 붙여 유일화한다.
          # (업데이터 서명은 파일 *내용* 기준이라 rename 해도 검증에 영향 없음)
          for f in macos-release/*.app.tar.gz; do
            [ -e "$f" ] || continue
            mv -f "$f" "macos-release/vibelign-gui_${MAC_ARCH_LABEL}.app.tar.gz"
          done
          for f in macos-release/*.app.tar.gz.sig; do
            [ -e "$f" ] || continue
            mv -f "$f" "macos-release/vibelign-gui_${MAC_ARCH_LABEL}.app.tar.gz.sig"
          done
          # 설치 도우미(install-macos.sh / README.txt)는 arch 무관 동일 파일이라
          # 두 macOS 잡이 같은 에셋을 중복 업로드하지 않도록 aarch64 잡에서만 생성한다.
          if [[ "${MAC_ARCH_LABEL}" == "aarch64" ]]; then
          printf '#!/bin/bash\n# VibeLign macOS 설치 스크립트\nset -e\nAPP_NAME="vibelign-gui.app"\nSEARCH_DIRS=("$HOME/Downloads" "$HOME/Desktop" "$(dirname "$0")")\necho "VibeLign 앱 찾는 중..."\nAPP_PATH=""\nfor DIR in "${SEARCH_DIRS[@]}"; do\n  if [ -d "$DIR/$APP_NAME" ]; then APP_PATH="$DIR/$APP_NAME"; break; fi\ndone\nif [ -z "$APP_PATH" ]; then\n  echo "오류: $APP_NAME 을 찾을 수 없습니다. Downloads 또는 Desktop 에 앱을 먼저 옮겨 주세요."\n  exit 1\nfi\necho "발견: $APP_PATH"\necho "macOS 격리 속성 제거 중..."\nxattr -rc "$APP_PATH"\necho "/Applications 로 복사 중..."\ncp -r "$APP_PATH" /Applications/\necho "설치 완료! VibeLign을 실행합니다."\nopen /Applications/$APP_NAME\n' > macos-release/install-macos.sh
          chmod +x macos-release/install-macos.sh
          printf 'VibeLign - macOS 설치 안내\n==========================\n\n처음 실행 시 "앱이 손상되었습니다" 오류가 뜨는 경우:\n\n방법 1 - 설치 스크립트 사용 (권장)\n  터미널에서 실행:\n  bash install-macos.sh\n\n방법 2 - 수동 해결\n  터미널에서 실행:\n  xattr -rc vibelign-gui.app\n  그 후 앱을 /Applications 폴더로 이동\n\n이 오류는 Apple 공증(notarization) 없이 배포된 앱에서\nmacOS Gatekeeper가 발생시키는 정상적인 보안 경고입니다.\n' > macos-release/README.txt
          fi

      - name: Generate macOS updater manifest
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]] || [[ -z "${TAURI_UPDATER_PUBKEY}" ]]; then
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path("macos-release")
          app_version = json.loads(Path("src-tauri/tauri.conf.json").read_text(encoding="utf-8"))["version"]
          candidates = sorted(root.glob("*.app.tar.gz"))
          if not candidates:
              raise SystemExit("No macOS updater archive found")
          asset = candidates[0]
          sig = Path(f"{asset}.sig")
          if not sig.exists():
              raise SystemExit(f"Missing macOS signature for {asset.name}")

          # 러너 아키텍처에 맞는 platform 키(darwin-aarch64 / darwin-x86_64). Determine 스텝이
          # $GITHUB_ENV 에 심은 값. 누락 시 안전하게 aarch64 로 폴백.
          platform_key = os.environ.get("MAC_UPDATER_KEY", "darwin-aarch64")
          payload = {
              "version": app_version,
              "notes": "See GitHub release notes for details.",
              "platforms": {
                  platform_key: {
                      "signature": sig.read_text(encoding="utf-8").strip(),
                      "url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/download/{os.environ['GITHUB_REF_NAME']}/{asset.name}",
                  }
              },
          }
          (root / "latest.macos.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")
          PY

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: vibelign-gui-macos-${{ env.MAC_ARCH_LABEL }}
          path: vibelign-gui/macos-release/
          if-no-files-found: warn

  windows-cross-check:
    name: Windows cross-compile check (gnu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vibelign-gui/package-lock.json

      - name: Install frontend dependencies
        working-directory: vibelign-gui
        run: npm ci

      # tauri 의 generate_context! 가 컴파일 시점에 frontendDist(../dist)를 임베드하므로
      # cargo check 전에 dist 가 있어야 한다. vib-runtime/_bundled 사이드카는 cargo check 에
      # 불필요(없으면 glob 경고만 남고 통과). pyinstaller/엔진 빌드 없이 ubuntu 에서 가볍게 돈다.
      - name: Build frontend
        working-directory: vibelign-gui
        run: npm run build

      - name: Setup Rust (windows-gnu target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install mingw-w64 (windows-gnu C toolchain + linker)
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vibelign-gui/src-tauri
          key: windows-gnu

      # tauri.conf.json 의 resources(["vib-runtime/**/*"]) 가 비어 있으면 tauri-build 가
      # 실패한다. 이 잡은 타입체크만 하고 번들하지 않으므로 실제 runtime 대신 stub 파일
      # 하나로 글롭을 만족시킨다(비숨김 파일이라야 glob 크레이트가 매칭함).
      - name: Stub vib-runtime resource (cargo check only)
        run: |
          mkdir -p vibelign-gui/src-tauri/vib-runtime
          echo "placeholder for cargo check; real runtime is built only for full bundles" > vibelign-gui/src-tauri/vib-runtime/placeholder

      # cfg(target_os = "windows") 코드(onboarding/windows.rs 등)가 실제로 컴파일되는지
      # 빠르게 검증한다. 풀 windows-latest 번들 빌드보다 훨씬 싸고 빨라 회귀를 조기에 잡는다.
      - name: cargo check (x86_64-pc-windows-gnu)
        working-directory: vibelign-gui/src-tauri
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
        run: cargo check --target x86_64-pc-windows-gnu

  release:
    name: Create GitHub Release
    needs: build
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: vibelign-gui-windows
          path: release-assets/windows

      - name: Download macOS artifacts (Apple Silicon)
        uses: actions/download-artifact@v4
        with:
          name: vibelign-gui-macos-aarch64
          path: release-assets/macos

      - name: Download macOS artifacts (Intel)
        uses: actions/download-artifact@v4
        # Intel(macos-13) 빌드가 실패해도 arm64/windows 릴리즈는 막지 않는다.
        # 매니페스트 병합/publish 글롭이 누락 파일을 자연스럽게 건너뛴다.
        continue-on-error: true
        with:
          name: vibelign-gui-macos-x64
          path: release-assets/macos-intel

      - name: Merge updater manifests
        shell: bash
        run: |
          if [[ ! -f release-assets/windows/latest.windows.json && ! -f release-assets/macos/latest.macos.json && ! -f release-assets/macos-intel/latest.macos.json ]]; then
            exit 0
          fi
          python - <<'PY'
          import json
          from pathlib import Path

          manifest_paths = [
            Path("release-assets/windows/latest.windows.json"),
            Path("release-assets/macos/latest.macos.json"),
            Path("release-assets/macos-intel/latest.macos.json"),
          ]
          version = None
          notes = "See GitHub release notes for details."
          platforms = {}

          for path in manifest_paths:
            if not path.exists():
              continue
            payload = json.loads(path.read_text(encoding="utf-8"))
            version = version or payload.get("version")
            notes = payload.get("notes") or notes
            platforms.update(payload.get("platforms", {}))

          if not version or not platforms:
            raise SystemExit("Missing updater manifest fragments")

          output = {
            "version": version,
            "notes": notes,
            "platforms": platforms,
          }
          Path("release-assets/latest.json").write_text(json.dumps(output, indent=2), encoding="utf-8")
          PY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/windows/**/*.exe
            release-assets/windows/**/*.sig
            release-assets/macos/**/*.dmg
