name: Phase 9 cross-platform verification

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
    paths:
      - "vibelign-core/**"
      - "vibelign/**"
      - "tests/test_cross_platform_paths.py"
      - "tests/test_checkpoint_cmd_wrapper.py"
      - "tests/test_mcp_checkpoint_handlers.py"
      - "tests/fixtures/**"
      - "pyproject.toml"
      - ".github/workflows/phase9-cross-platform.yml"
  pull_request:
    paths:
      - "vibelign-core/**"
      - "vibelign/**"
      - "tests/test_cross_platform_paths.py"
      - "tests/test_checkpoint_cmd_wrapper.py"
      - "tests/test_mcp_checkpoint_handlers.py"
      - "tests/fixtures/**"
      - "pyproject.toml"
      - ".github/workflows/phase9-cross-platform.yml"
  workflow_dispatch:

jobs:
  verify:
    name: ${{ matrix.os }} backup edge tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Rust backup tests
        run: cargo test --manifest-path vibelign-core/Cargo.toml

      - name: Install Python package
        run: python -m pip install -e . pytest

      - name: Run Python backup contract tests
        run: python -m pytest tests/test_cross_platform_paths.py tests/test_checkpoint_cmd_wrapper.py tests/test_mcp_checkpoint_handlers.py -q
